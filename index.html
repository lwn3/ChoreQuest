<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChoreQuest</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css?v=0.1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0f1115" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="logo">⚔️</div>
      <h1>ChoreQuest</h1>
      <p>Complete quests. Earn XP. Unlock rewards.</p>
    </header>

    <section class="card">
      <h2>Choose Your Character</h2>

      <a class="character" href="?kid=K001">
        <div class="avatar">🐺</div>
        <div>
          <strong>Cammron</strong>
          <span>Brawler Apprentice</span>
        </div>
      </a>

      <a class="character" href="?kid=K002">
        <div class="avatar">🦊</div>
        <div>
          <strong>Autumn</strong>
          <span>Magic Apprentice</span>
        </div>
      </a>

      <a class="character parent-link" href="?parent=true">
        <div class="avatar">🛡️</div>
        <div>
          <strong>Parent Dashboard</strong>
          <span>Quest Review & Guild Hall</span>
        </div>
      </a>

    </section>
  </main>

  <script type="module" src="app.js?v=0.3.3"></script>
</body>
</html>
